<!DOCTYPE html>
<html>
    <head>
        <title>Mi portafolio</title>

        <style>
            body {
                background-color: #fafafa;
                font-family: sans-serif;
                text-align: center;
                padding: 50px;
            }
            
            h1 {
                color: #141412;
                font-size: 48px;
            }

            p {
                color: #a0a09a;
                font-size: 18px;
            }

            .card {
                background: white;
                border: 1px solid #e8e8e8;
                border-radius: 16px;
                padding: 30px;
                width: 300px;
                margin: 30px auto;
            }

            a {
                display: inline-block;
                margin-top: 12px;
                padding: 10px 12px;
                background: #141412;
                color: white;
                border-radius: 99px;
                text-decoration: none;
                font-size: 14px;
            }

            .contenedor {
                display: flex;
                gap: 20px;
                justify-content: center;
            }
        </style>

    </head>
    <body>
        <h1>Hola, soy AngelDLO</h1>
        <p>Contruyo apps.</p>
        <div class="card">
            <h2>Sleep Tracker</h2>
            <p>Registra tus horas de sueño.</p>
            <a href="https://angeldlo.github.io/Sleep-Tracker/">Ver app</a>
        </div>

        <div class="card">
            <h2>PassGen</h2>
            <p>Generador de contraseñas seguras</p>
            <a href="https://angeldlo.github.io/Password-Generator/">Ver app</a>
        </div>

        <div class="contenedor">
            <div class="card">
                ...Sleep Tracker...
            </div>
            <div class="card">
                ...PassGen...
            </div>
        </div>
    </body>
</html>
